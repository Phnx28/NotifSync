name: CI

# Lightweight compile check on every pull request — does NOT produce an APK
# (the build.yml workflow handles that on merge to main / tags).
# This catches syntax/type errors and dependency issues early.

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compile debug sources
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace

      - name: Lint
        run: ./gradlew lintDebug --no-daemon || true
        continue-on-error: true
